<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessDB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --bg-card:#1a1a1a; --bg-hover:#222; --bg-input:#151515;
  --border:#2a2a2a; --border-lt:#333;
  --text:#e8e6e1; --text-dim:#8a8780; --text-muted:#5a5850;
  --accent:#c9a84c; --accent-dim:#a08530;
  --green:#5a9e5a; --red:#c45a5a; --draw:#888;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{color:var(--text)}

/* NAV */
nav{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:2rem;height:56px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-size:1.05rem;font-weight:600;color:var(--accent);letter-spacing:.5px;cursor:pointer}
.logo span{font-size:1.2rem}
.links{display:flex;gap:.25rem}
.links a{color:var(--text-dim);padding:.4rem .75rem;border-radius:6px;font-size:.85rem;font-weight:500;transition:all .15s}
.links a:hover,.links a.active{color:var(--text);background:var(--bg-hover)}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:2rem}
.page-header{margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.page-header h1{font-size:1.5rem;font-weight:600}
.page-header p{color:var(--text-dim);font-size:.9rem;margin-top:.25rem}

/* FILTERS */
.filters{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filters input,.filters select{background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;border-radius:6px;font-family:inherit;font-size:.85rem;outline:none;transition:border-color .15s}
.filters input:focus,.filters select:focus{border-color:var(--accent-dim)}
.filters input{flex:1;min-width:200px}
.btn{background:var(--accent-dim);color:var(--bg);border:none;padding:.5rem 1rem;border-radius:6px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--accent)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--accent-dim);color:var(--text);background:transparent}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead th{text-align:left;padding:.6rem .75rem;color:var(--text-muted);font-weight:500;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--bg-card)}
tbody td{padding:.65rem .75rem;vertical-align:middle}
.result{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:500;padding:.15rem .5rem;border-radius:4px;display:inline-block;min-width:56px;text-align:center}
.result-w{background:rgba(232,230,225,.12);color:var(--text)}
.result-b{background:rgba(85,85,85,.25);color:var(--text-dim)}
.result-d{background:rgba(136,136,136,.15);color:var(--draw)}
.tb{font-size:.72rem;font-weight:600;color:var(--accent);margin-right:.2rem}
.eco{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-dim)}
.date-col{color:var(--text-dim);font-size:.82rem;font-family:'JetBrains Mono',monospace}
.mono{font-family:'JetBrains Mono',monospace}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;transition:border-color .15s;cursor:pointer}
.card:hover{border-color:var(--border-lt)}
.card h3{font-size:.95rem;font-weight:500;margin-bottom:.35rem}
.card .meta{color:var(--text-dim);font-size:.82rem}
.card .stat{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--accent);margin-top:.5rem}

/* DETAIL */
.detail-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.detail-header h1{font-size:1.4rem;font-weight:600}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.detail-item label{display:block;font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem}
.detail-item span{font-size:.95rem;color:var(--text)}
.moves-box{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;font-family:'JetBrains Mono',monospace;font-size:.88rem;line-height:1.8;color:var(--text-dim);margin-bottom:2rem;word-wrap:break-word}
.stat-row{display:flex;gap:2rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat-box{text-align:center}
.stat-box .num{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:600}
.stat-box .label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.win{color:var(--green)}.loss{color:var(--red)}
.tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.tag{font-size:.78rem;padding:.2rem .6rem;border-radius:4px;background:rgba(201,168,76,.12);color:var(--accent);border:1px solid rgba(201,168,76,.2);cursor:pointer}
.tag:hover{background:rgba(201,168,76,.22)}
.back{color:var(--text-dim);font-size:.85rem;margin-bottom:1rem;display:inline-block}
.back:hover{color:var(--text)}
.empty{text-align:center;padding:3rem;color:var(--text-muted)}

@media(max-width:700px){
  nav{padding:0 1rem;gap:1rem;overflow-x:auto}
  .container{padding:1rem}
  .filters{flex-direction:column}
  .stat-row{gap:1rem}
  .detail-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

const P = id => players.find(p=>p.id===id);
const E = id => events.find(e=>e.id===id);
const O = eco => openings.find(o=>o.eco===eco);
const pname = p => p ? `${p.first} ${p.last}` : '—';
const ptitle = p => p && p.title && p.title!=='none' ? `<span class="tb">${p.title}</span>` : '';
const rclass = r => r==='1-0'?'result-w':r==='0-1'?'result-b':'result-d';
const esc = s => s||'—';
const app = document.getElementById('app');

function go(view, id) {
  window.location.hash = id!==undefined ? `${view}/${id}` : view;
}

function setNav(view) {
  document.querySelectorAll('[data-nav]').forEach(a => {
    a.classList.toggle('active', a.dataset.nav === view);
  });
}

function viewGames(params={}) {
  setNav('games');
  const search = (params.search||'').toLowerCase();
  const oFilter = params.opening||'';
  const rFilter = params.result||'';

  let filtered = games.filter(g => {
    const wp = P(g.white), bp = P(g.black), ev = E(g.event);
    if (search && !pname(wp).toLowerCase().includes(search) && !pname(bp).toLowerCase().includes(search) && !(ev&&ev.name.toLowerCase().includes(search))) return false;
    if (oFilter && g.eco !== oFilter) return false;
    if (rFilter && g.result !== rFilter) return false;
    return true;
  }).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  let openOpts = openings.map(o=>`<option value="${o.eco}" ${oFilter===o.eco?'selected':''}>${o.name} (${o.eco})</option>`).join('');

  app.innerHTML = `
    <div class="page-header"><div><h1>Games</h1><p>${filtered.length} game${filtered.length!==1?'s':''} in database</p></div></div>
    <div class="filters">
      <input type="text" id="f-search" placeholder="Search players or events..." value="${params.search||''}">
      <select id="f-opening"><option value="">All openings</option>${openOpts}</select>
      <select id="f-result"><option value="">All results</option><option value="1-0" ${rFilter==='1-0'?'selected':''}>1-0</option><option value="0-1" ${rFilter==='0-1'?'selected':''}>0-1</option><option value="1/2-1/2" ${rFilter==='1/2-1/2'?'selected':''}>½-½</option></select>
      <button class="btn" onclick="applyFilters()">Filter</button>
      ${search||oFilter||rFilter?'<button class="btn btn-outline" onclick="go(\'games\')">Clear</button>':''}
    </div>
    ${filtered.length ? `<table><thead><tr><th>White</th><th>Result</th><th>Black</th><th>Opening</th><th>Event</th><th>Date</th></tr></thead><tbody>
      ${filtered.map(g=>{
        const wp=P(g.white),bp=P(g.black),o=O(g.eco),ev=E(g.event);
        return `<tr onclick="go('game',${g.id})">
          <td>${ptitle(wp)}${pname(wp)}</td>
          <td><span class="result ${rclass(g.result)}">${g.result}</span></td>
          <td>${ptitle(bp)}${pname(bp)}</td>
          <td>${o?`<span class="eco">${o.eco}</span> ${o.name}`:'—'}</td>
          <td>${ev?ev.name:'—'}</td>
          <td class="date-col">${esc(g.date)}</td>
        </tr>`;
      }).join('')}
    </tbody></table>` : '<div class="empty">No games found.</div>'}`;
}

function applyFilters() {
  const s = document.getElementById('f-search').value.trim();
  const o = document.getElementById('f-opening').value;
  const r = document.getElementById('f-result').value;
  let hash = 'games';
  const p = [];
  if(s)p.push('search='+encodeURIComponent(s));
  if(o)p.push('opening='+o);
  if(r)p.push('result='+encodeURIComponent(r));
  if(p.length) hash += '?' + p.join('&');
  window.location.hash = hash;
}

function viewGame(id) {
  setNav('games');
  const g = games.find(x=>x.id===id);
  if(!g){app.innerHTML='<div class="empty">Game not found.</div>';return;}
  const wp=P(g.white),bp=P(g.black),o=O(g.eco),ev=E(g.event);
  const cols = gameCollections.filter(gc=>gc.game===id).map(gc=>collections.find(c=>c.id===gc.col));

  app.innerHTML = `
    <a class="back" onclick="go('games')">&larr; Back to games</a>
    <div class="detail-header">
      <h1>${ptitle(wp)}<a onclick="go('player',${wp.id})">${pname(wp)}</a>
        <span style="color:var(--text-muted);font-weight:400"> vs </span>
        ${ptitle(bp)}<a onclick="go('player',${bp.id})">${pname(bp)}</a></h1>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><label>Result</label><span class="result ${rclass(g.result)}">${g.result}</span></div>
      <div class="detail-item"><label>Date</label><span>${esc(g.date)}</span></div>
      <div class="detail-item"><label>Round</label><span>${esc(g.round)}</span></div>
      <div class="detail-item"><label>Time Control</label><span>${esc(g.tc)}</span></div>
      <div class="detail-item"><label>Event</label><span>${ev?`<a onclick="go('event',${ev.id})">${ev.name}</a>`:'—'}</span></div>
      <div class="detail-item"><label>Opening</label><span>${o?`<span class="eco">${o.eco}</span> ${o.name} (${o.family})`:'—'}</span></div>
      <div class="detail-item"><label>White Rating</label><span class="mono">${wp?wp.rating:'—'}</span></div>
      <div class="detail-item"><label>Black Rating</label><span class="mono">${bp?bp.rating:'—'}</span></div>
    </div>
    ${g.moves?`<h3 style="margin-bottom:.5rem;font-size:.9rem;color:var(--text-dim)">Moves</h3><div class="moves-box">${g.moves}</div>`:''}
    ${cols.length?`<h3 style="margin-bottom:.5rem;font-size:.9rem;color:var(--text-dim)">Collections</h3><div class="tags">${cols.map(c=>`<a class="tag" onclick="go('collection',${c.id})">${c.name}</a>`).join('')}</div>`:''}`;
}

function viewPlayers() {
  setNav('players');
  const sorted = [...players].sort((a,b)=>b.rating-a.rating);
  const stats = sorted.map(p => {
    const pg = games.filter(g=>g.white===p.id||g.black===p.id);
    const wins = pg.filter(g=>(g.white===p.id&&g.result==='1-0')||(g.black===p.id&&g.result==='0-1')).length;
    return {...p, total:pg.length, wins};
  });

  app.innerHTML = `
    <div class="page-header"><div><h1>Players</h1><p>${players.length} players ranked by rating</p></div></div>
    <table><thead><tr><th>Player</th><th>Title</th><th>Rating</th><th>Country</th><th>Games</th><th>Wins</th></tr></thead><tbody>
      ${stats.map(p=>`<tr onclick="go('player',${p.id})">
        <td>${p.first} ${p.last}</td>
        <td>${p.title&&p.title!=='none'?`<span class="tb">${p.title}</span>`:'—'}</td>
        <td><span class="eco">${p.rating||'—'}</span></td>
        <td>${esc(p.country)}</td>
        <td>${p.total}</td>
        <td>${p.wins}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

function viewPlayer(id) {
  setNav('players');
  const p = P(id);
  if(!p){app.innerHTML='<div class="empty">Player not found.</div>';return;}
  const pg = games.filter(g=>g.white===id||g.black===id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const wins = pg.filter(g=>(g.white===id&&g.result==='1-0')||(g.black===id&&g.result==='0-1')).length;
  const draws = pg.filter(g=>g.result==='1/2-1/2').length;
  const losses = pg.length - wins - draws;
  const winPct = pg.length ? Math.round(100*wins/pg.length) : 0;

  app.innerHTML = `
    <a class="back" onclick="go('players')">&larr; Back to players</a>
    <div class="detail-header">
      <h1>${ptitle(p)}${pname(p)}</h1>
      <p style="color:var(--text-dim)">${esc(p.country)}${p.rating?' &middot; Rating: '+p.rating:''}</p>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="num">${pg.length}</div><div class="label">Games</div></div>
      <div class="stat-box"><div class="num win">${wins}</div><div class="label">Wins</div></div>
      <div class="stat-box"><div class="num" style="color:var(--draw)">${draws}</div><div class="label">Draws</div></div>
      <div class="stat-box"><div class="num loss">${losses}</div><div class="label">Losses</div></div>
      <div class="stat-box"><div class="num" style="color:var(--accent)">${winPct}%</div><div class="label">Win Rate</div></div>
    </div>
    <h3 style="margin-bottom:.75rem;font-size:.95rem">Game History</h3>
    <table><thead><tr><th>White</th><th>Result</th><th>Black</th><th>Opening</th><th>Event</th><th>Date</th></tr></thead><tbody>
      ${pg.map(g=>{
        const wp=P(g.white),bp=P(g.black),o=O(g.eco),ev=E(g.event);
        return `<tr onclick="go('game',${g.id})">
          <td>${ptitle(wp)}${pname(wp)}</td>
          <td><span class="result ${rclass(g.result)}">${g.result}</span></td>
          <td>${ptitle(bp)}${pname(bp)}</td>
          <td>${o?o.name:'—'}</td>
          <td>${ev?ev.name:'—'}</td>
          <td class="date-col">${esc(g.date)}</td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
}

function viewEvents() {
  setNav('events');
  const sorted = [...events].sort((a,b)=>(b.start||'').localeCompare(a.start||''));
  app.innerHTML = `
    <div class="page-header"><div><h1>Events</h1><p>${events.length} events</p></div></div>
    <div class="card-grid">
      ${sorted.map(e=>{
        const count = games.filter(g=>g.event===e.id).length;
        return `<div class="card" onclick="go('event',${e.id})">
          <h3>${e.name}</h3>
          <div class="meta">${e.city}, ${e.country} &middot; ${e.type}</div>
          <div class="meta">${e.start}${e.end?' &rarr; '+e.end:''}</div>
          <div class="stat">${count} game${count!==1?'s':''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function viewEvent(id) {
  setNav('events');
  const ev = E(id);
  if(!ev){app.innerHTML='<div class="empty">Event not found.</div>';return;}
  const eg = games.filter(g=>g.event===id).sort((a,b)=>(a.round||'').localeCompare(b.round||''));

  app.innerHTML = `
    <a class="back" onclick="go('events')">&larr; Back to events</a>
    <div class="detail-header">
      <h1>${ev.name}</h1>
      <p style="color:var(--text-dim)">${ev.city}, ${ev.country} &middot; ${ev.type} &middot; ${ev.start}${ev.end?' &rarr; '+ev.end:''}</p>
    </div>
    <h3 style="margin-bottom:.75rem;font-size:.95rem">Games (${eg.length})</h3>
    <table><thead><tr><th>Rd</th><th>White</th><th>Result</th><th>Black</th><th>Opening</th><th>Date</th></tr></thead><tbody>
      ${eg.map(g=>{
        const wp=P(g.white),bp=P(g.black),o=O(g.eco);
        return `<tr onclick="go('game',${g.id})">
          <td class="eco">${esc(g.round)}</td>
          <td>${ptitle(wp)}${pname(wp)}</td>
          <td><span class="result ${rclass(g.result)}">${g.result}</span></td>
          <td>${ptitle(bp)}${pname(bp)}</td>
          <td>${o?o.name:'—'}</td>
          <td class="date-col">${esc(g.date)}</td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
}

function viewOpenings() {
  setNav('openings');
  const sorted = [...openings].sort((a,b)=>a.family.localeCompare(b.family)||a.eco.localeCompare(b.eco));
  app.innerHTML = `
    <div class="page-header"><div><h1>Openings</h1><p>${openings.length} openings in database</p></div></div>
    <table><thead><tr><th>ECO</th><th>Name</th><th>Family</th><th>Games</th><th>White Win %</th></tr></thead><tbody>
      ${sorted.map(o=>{
        const og = games.filter(g=>g.eco===o.eco);
        const ww = og.filter(g=>g.result==='1-0').length;
        const pct = og.length ? Math.round(100*ww/og.length) : 0;
        return `<tr>
          <td class="eco">${o.eco}</td>
          <td>${o.name}</td>
          <td style="color:var(--text-dim)">${o.family}</td>
          <td>${og.length}</td>
          <td>${og.length?`<span class="eco">${pct}%</span>`:'—'}</td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
}

function viewCollections() {
  setNav('collections');
  app.innerHTML = `
    <div class="page-header"><div><h1>Collections</h1><p>${collections.length} collections</p></div></div>
    <div class="card-grid">
      ${collections.map(c=>{
        const count = gameCollections.filter(gc=>gc.col===c.id).length;
        return `<div class="card" onclick="go('collection',${c.id})">
          <h3>${c.name}</h3>
          <div class="meta">${c.desc||''}</div>
          <div class="stat">${count} game${count!==1?'s':''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function viewCollection(id) {
  setNav('collections');
  const col = collections.find(c=>c.id===id);
  if(!col){app.innerHTML='<div class="empty">Collection not found.</div>';return;}
  const gids = gameCollections.filter(gc=>gc.col===id).map(gc=>gc.game);
  const cg = games.filter(g=>gids.includes(g.id)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  app.innerHTML = `
    <a class="back" onclick="go('collections')">&larr; Back to collections</a>
    <div class="detail-header">
      <h1>${col.name}</h1>
      ${col.desc?`<p style="color:var(--text-dim)">${col.desc}</p>`:''}
    </div>
    <h3 style="margin-bottom:.75rem;font-size:.95rem">Games (${cg.length})</h3>
    <table><thead><tr><th>White</th><th>Result</th><th>Black</th><th>Opening</th><th>Event</th><th>Date</th></tr></thead><tbody>
      ${cg.map(g=>{
        const wp=P(g.white),bp=P(g.black),o=O(g.eco),ev=E(g.event);
        return `<tr onclick="go('game',${g.id})">
          <td>${ptitle(wp)}${pname(wp)}</td>
          <td><span class="result ${rclass(g.result)}">${g.result}</span></td>
          <td>${ptitle(bp)}${pname(bp)}</td>
          <td>${o?o.name:'—'}</td>
          <td>${ev?ev.name:'—'}</td>
          <td class="date-col">${esc(g.date)}</td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
}

// ══════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════
function route() {
  const hash = (window.location.hash||'#games').slice(1);
  const [path, qs] = hash.split('?');
  const parts = path.split('/');
  const view = parts[0];
  const id = parts[1] ? parseInt(parts[1]) : undefined;

  const params = {};
  if (qs) qs.split('&').forEach(p => { const [k,v] = p.split('='); params[k] = decodeURIComponent(v); });

  switch(view) {
    case 'game': viewGame(id); break;
    case 'players': viewPlayers(); break;
    case 'player': viewPlayer(id); break;
    case 'events': viewEvents(); break;
    case 'event': viewEvent(id); break;
    case 'openings': viewOpenings(); break;
    case 'collections': viewCollections(); break;
    case 'collection': viewCollection(id); break;
    default: viewGames(params);
  }
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
